name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: WCJ web quality gate
        run: npm run validate:wcj

      - name: Whitespace check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$PR_BASE_SHA" "$PR_HEAD_SHA"
          elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "$PUSH_BEFORE_SHA" "$HEAD_SHA"
          else
            EMPTY_TREE_SHA="$(git hash-object -t tree /dev/null)"
            git diff --check "$EMPTY_TREE_SHA" "$HEAD_SHA"
          fi

      - name: Build
        run: npm run build

      # Non-blocking by policy: current Next-bundled PostCSS moderate findings
      # are tracked as a temporary exception until a non-breaking upstream fix exists.
      - name: Audit report
        run: npm audit --audit-level=moderate || true
