name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Non-blocking by policy: current Next-bundled PostCSS moderate findings
      # are tracked as a temporary exception until a non-breaking upstream fix exists.
      - name: Audit report
        run: npm audit --audit-level=moderate || true
